<!DOCTYPE html>
<html lang="en" dir="ltr" class="dark scroll-smooth">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<meta name="description" content="Login to your Voxora AI dashboard — Access your voice AI agents, analytics, and settings."/>
<title>Login — Voxora AI</title>
<script src="https://cdn.tailwindcss.com"></script>
<script>tailwind.config={darkMode:'class',theme:{extend:{colors:{brand:{50:'#ecfeff',100:'#cffafe',200:'#a5f3fc',300:'#67e8f9',400:'#22d3ee',500:'#06b6d4',600:'#0891b2',700:'#0e7490',800:'#155e75',900:'#164e63'},accent:{400:'#818cf8',500:'#6366f1',600:'#4f46e5'}}}}};</script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet"/>
<style>
*{margin:0;padding:0;box-sizing:border-box}body{font-family:'Inter',system-ui,sans-serif;overflow-x:hidden}.dark body{background:#0a0e27;color:#e2e8f0}::selection{background:rgba(6,182,212,0.3)}.glass{background:rgba(15,23,42,0.6);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,0.08)}.glass-card{background:rgba(15,23,42,0.4);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border:1px solid rgba(255,255,255,0.06);border-radius:1rem;transition:all .3s ease}.gradient-text{background:linear-gradient(135deg,#06b6d4,#6366f1,#06b6d4);background-size:200% auto;-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}@keyframes fade-up{from{opacity:0;transform:translateY(30px)}to{opacity:1;transform:translateY(0)}}.animate-fade-up{animation:fade-up .6s ease both}@keyframes pulse-glow{0%,100%{box-shadow:0 0 20px rgba(6,182,212,0.2)}50%{box-shadow:0 0 40px rgba(6,182,212,0.4)}}.animate-pulse-glow{animation:pulse-glow 3s ease-in-out infinite}:focus-visible{outline:2px solid #06b6d4;outline-offset:2px;border-radius:4px}
</style>
</head>
<body class="dark:bg-[#0a0e27] bg-slate-50 dark:text-slate-200 text-slate-800 font-sans">

<main class="min-h-screen flex items-center justify-center px-4 relative">
<div class="absolute inset-0 bg-gradient-to-br from-[#0a0e27] via-[#0f1740] to-[#0a0e27]"></div>
<!-- Glow orbs -->
<div class="absolute top-1/4 left-1/4 w-96 h-96 bg-brand-500/10 rounded-full blur-[120px]" aria-hidden="true"></div>
<div class="absolute bottom-1/4 right-1/4 w-80 h-80 bg-accent-500/10 rounded-full blur-[100px]" aria-hidden="true"></div>

<div class="relative z-10 w-full max-w-md animate-fade-up">
<!-- Logo -->
<div class="text-center mb-8">
<a href="index.html" class="inline-flex items-center gap-2" aria-label="Back to Voxora AI Home">
<div class="w-12 h-12 rounded-xl bg-gradient-to-br from-brand-400 to-accent-500 flex items-center justify-center animate-pulse-glow">
<svg class="w-7 h-7 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M12 18.5c4.5 0 7-3 7-6.5S16.5 5.5 12 5.5 5 8.5 5 12s2.5 6.5 7 6.5z"/><circle cx="12" cy="12" r="2.5"/></svg>
</div>
<span class="text-2xl font-bold gradient-text">Voxora AI</span>
</a>
</div>

<!-- Login Card -->
<div class="glass-card p-8 rounded-2xl">
<h1 class="text-2xl font-bold mb-2 text-center">Welcome Back</h1>
<p class="text-sm dark:text-slate-400 text-slate-600 text-center mb-8">Sign in to access your voice AI dashboard</p>

<form id="loginForm" onsubmit="handleLogin(event)" novalidate>
<div class="space-y-4">
<div>
<label for="loginEmail" class="block text-sm font-medium mb-1">Email Address</label>
<input type="email" id="loginEmail" name="email" required autocomplete="email" class="w-full px-4 py-3 rounded-xl dark:bg-slate-800/60 bg-white border dark:border-slate-700 border-slate-200 focus:border-brand-400 focus:ring-2 focus:ring-brand-400/20 transition-all text-sm" placeholder="you@company.com"/>
</div>
<div>
<label for="loginPassword" class="block text-sm font-medium mb-1">Password</label>
<div class="relative">
<input type="password" id="loginPassword" name="password" required autocomplete="current-password" class="w-full px-4 py-3 rounded-xl dark:bg-slate-800/60 bg-white border dark:border-slate-700 border-slate-200 focus:border-brand-400 focus:ring-2 focus:ring-brand-400/20 transition-all text-sm pr-12" placeholder="••••••••"/>
<button type="button" onclick="togglePassword()" class="absolute right-3 top-1/2 -translate-y-1/2 p-1 dark:text-slate-400 text-slate-500 hover:text-brand-400 transition-colors" aria-label="Toggle password visibility">
<svg id="eyeIcon" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/><path d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/></svg>
</button>
</div>
</div>

<div class="flex items-center justify-between text-sm">
<label class="flex items-center gap-2 cursor-pointer">
<input type="checkbox" class="w-4 h-4 rounded border-slate-600 text-brand-500 focus:ring-brand-400"/>
<span class="dark:text-slate-400 text-slate-600">Remember me</span>
</label>
<a href="#" class="text-brand-400 hover:underline">Forgot password?</a>
</div>

<button type="submit" class="w-full py-3 rounded-xl bg-gradient-to-r from-brand-500 to-accent-500 text-white font-bold hover:shadow-lg hover:shadow-brand-500/25 transition-all duration-300">
Sign In
</button>
</div>
</form>

<!-- Divider -->
<div class="flex items-center gap-4 my-6">
<div class="flex-1 h-px dark:bg-slate-700 bg-slate-200"></div>
<span class="text-xs dark:text-slate-500 text-slate-400">or continue with</span>
<div class="flex-1 h-px dark:bg-slate-700 bg-slate-200"></div>
</div>

<!-- SSO -->
<div class="grid grid-cols-2 gap-3">
<button class="flex items-center justify-center gap-2 px-4 py-2.5 rounded-xl border dark:border-slate-700 border-slate-200 hover:border-brand-400 transition-all text-sm font-medium">
<svg class="w-5 h-5" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 01-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
Google
</button>
<button class="flex items-center justify-center gap-2 px-4 py-2.5 rounded-xl border dark:border-slate-700 border-slate-200 hover:border-brand-400 transition-all text-sm font-medium">
<svg class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24"><path d="M19 3a2 2 0 012 2v14a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h14m-.5 15.5v-5.3a3.26 3.26 0 00-3.26-3.26c-.85 0-1.84.52-2.32 1.3v-1.11h-2.79v8.37h2.79v-4.93c0-.77.62-1.4 1.39-1.4a1.4 1.4 0 011.4 1.4v4.93h2.79M6.88 8.56a1.68 1.68 0 001.68-1.68c0-.93-.75-1.69-1.68-1.69a1.69 1.69 0 00-1.69 1.69c0 .93.76 1.68 1.69 1.68m1.39 9.94v-8.37H5.5v8.37h2.77z"/></svg>
Microsoft
</button>
</div>

<p class="text-center text-sm dark:text-slate-400 text-slate-600 mt-6">
Don't have an account? <a href="demo.html" class="text-brand-400 hover:underline font-medium">Request a demo</a>
</p>
</div>

<!-- Security note -->
<div class="flex items-center justify-center gap-4 mt-6 text-xs dark:text-slate-500 text-slate-400">
<span class="flex items-center gap-1"><svg class="w-3.5 h-3.5 text-emerald-400" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/></svg>256-bit encryption</span>
<span class="flex items-center gap-1"><svg class="w-3.5 h-3.5 text-emerald-400" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"/></svg>SOC 2 certified</span>
</div>

<p class="text-center text-xs dark:text-slate-500 text-slate-400 mt-4">
<a href="index.html" class="hover:text-brand-400 transition-colors">← Back to home</a>
</p>
</div>
</main>

<script>
function togglePassword() {
  const input = document.getElementById('loginPassword');
  input.type = input.type === 'password' ? 'text' : 'password';
}
function handleLogin(e) {
  e.preventDefault();
  const email = document.getElementById('loginEmail');
  const pass = document.getElementById('loginPassword');
  let valid = true;
  if (!email.value.trim() || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email.value)) { email.classList.add('border-red-500'); valid = false; } else { email.classList.remove('border-red-500'); }
  if (!pass.value.trim()) { pass.classList.add('border-red-500'); valid = false; } else { pass.classList.remove('border-red-500'); }
  if (valid) { alert('Login functionality would connect to your authentication backend. This is a demo.'); }
}
</script>
</body>
</html>
